user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
  worker_connections 5000;
  use epoll;
  multi_accept on;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                  '$status $body_bytes_sent "$http_referer" '
                  '"$http_user_agent" "$http_x_forwarded_for" '
                  'rt=$request_time uct="$upstream_connect_time" '
                  'uht="$upstream_header_time" urt="$upstream_response_time"';

  access_log /var/log/nginx/access.log main;

  sendfile on;
  tcp_nopush on;
  tcp_nodelay on;
  keepalive_timeout 65;
  types_hash_max_size 2048;
  client_max_body_size 50M;

  # Gzip compression
  gzip on;
  gzip_vary on;
  gzip_proxied any;
  gzip_comp_level 6;
  gzip_types text/plain text/css text/xml text/javascript 
             application/json application/javascript application/xml+rss 
             application/rss+xml application/atom+xml image/svg+xml 
             text/x-js text/x-component text/x-cross-domain-policy;
  gzip_disable "msie6";

  # Rate limiting zones
  limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/s;
  limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/s;

  # Caching
  proxy_cache_path /var/cache/nginx levels=1:2 keys_zone=api_cache:10m max_size=1g inactive=1h;

  # Upstream backend servers
  upstream backend {
    least_conn;
    server backend-1:5000 max_fails=2 fail_timeout=10s weight=1;
    server backend-2:5000 max_fails=2 fail_timeout=10s weight=1;
    server backend-3:5000 max_fails=2 fail_timeout=10s weight=1;
    keepalive 32;
  }

  server {
    listen 80;
    server_name _;
    
    # Redirect HTTP to HTTPS (when behind ALB with SSL termination, remove this)
    # return 301 https://$server_name$request_uri;
  }

  server {
    listen 80;
    server_name _;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # API endpoints
    location /api/ {
      # Rate limiting
      limit_req zone=api_limit burst=200 nodelay;

      proxy_pass http://backend;
      proxy_http_version 1.1;
      proxy_set_header Connection "";
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Request-ID $request_id;

      # Cache GET requests for 5 minutes
      proxy_cache api_cache;
      proxy_cache_methods GET HEAD;
      proxy_cache_valid 200 5m;
      proxy_cache_valid 404 1m;
      proxy_cache_use_stale error timeout http_500 http_502 http_503 http_504;
      add_header X-Cache-Status $upstream_cache_status always;

      # Dont cache authenticated requests
      proxy_cache_bypass $http_authorization;
      proxy_no_cache $http_authorization;

      # Timeouts
      proxy_connect_timeout 5s;
      proxy_send_timeout 10s;
      proxy_read_timeout 10s;

      # Buffering
      proxy_buffering on;
      proxy_buffer_size 4k;
      proxy_buffers 8 4k;
      proxy_busy_buffers_size 8k;
    }

    # Auth endpoints (stricter rate limit)
    location ~ ^/api/(auth|login|register|verify) {
      limit_req zone=auth_limit burst=10 nodelay;

      proxy_pass http://backend;
      proxy_http_version 1.1;
      proxy_set_header Connection "";
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

      # No caching for auth
      proxy_cache off;
      proxy_no_cache 1;

      # Longer timeouts for auth
      proxy_connect_timeout 10s;
      proxy_send_timeout 15s;
      proxy_read_timeout 15s;
    }

    # Health check (no rate limit, no cache)
    location /health {
      proxy_pass http://backend;
      access_log off;
    }

    # Static files (frontend)
    location / {
      root /usr/share/nginx/html;
      try_files $uri /index.html;

      # Long cache for versioned assets
      location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
      }

      # Shorter cache for HTML
      location ~* \.html?$ {
        expires 1h;
        add_header Cache-Control "public, must-revalidate";
      }
    }
  }
}
