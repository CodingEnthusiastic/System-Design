version: '3.8'

services:
  mongodb:
    image: mongo:7.0-alpine
    container_name: system-design-mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: password123
      MONGO_INITDB_DATABASE: system_design_db
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    networks:
      - app-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/system_design_db -u root -p password123
      interval: 10s
      timeout: 5s
      retries: 3
    command: mongod --replSet rs0

  mongodb-init:
    image: mongo:7.0-alpine
    container_name: system-design-mongodb-init
    depends_on:
      - mongodb
    networks:
      - app-network
    command: >
      mongosh mongodb://root:password123@mongodb:27017/system_design_db
      --eval "rs.initiate({_id: 'rs0', members: [{_id: 0, host: 'mongodb:27017'}]})"

  redis:
    image: redis:7-alpine
    container_name: system-design-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - app-network
    command: redis-server --appendonly yes --requirepass password123
    healthcheck:
      test: redis-cli --raw incr ping
      interval: 10s
      timeout: 5s
      retries: 3

  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: system-design-backend
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: development
      PORT: 5000
      MONGODB_URI: mongodb://root:password123@mongodb:27017/system_design_db?authSource=admin&replicaSet=rs0
      MONGODB_MAX_POOL_SIZE: 20
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: password123
      JWT_SECRET: dev-secret-key-change-in-production
      JWT_EXPIRY: 7d
      VITE_API_URL: http://localhost:5000
      FRONTEND_URLS: http://localhost,http://localhost:3000
      NODE_OPTIONS: --max-old-space-size=512
    depends_on:
      mongodb:
        condition: service_healthy
      mongodb-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    volumes:
      - ./server:/app
      - /app/node_modules
      - ./uploads:/app/uploads
    networks:
      - app-network
    command: npm run dev
    healthcheck:
      test: curl -f http://localhost:5000/health || exit 1
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: system-design-frontend
    ports:
      - "80:80"
    environment:
      VITE_API_URL: http://localhost:5000
    depends_on:
      - backend
    networks:
      - app-network
    healthcheck:
      test: curl -f http://localhost/ || exit 1
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  mongodb_data:
  mongodb_config:
  redis_data:

networks:
  app-network:
    driver: bridge
