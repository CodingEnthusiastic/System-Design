name: Security Scan

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    - cron: '0 2 * * *'  # Daily at 2 AM UTC

jobs:
  sast:
    runs-on: ubuntu-latest
    name: SAST Analysis
    
    steps:
    - uses: actions/checkout@v3

    - name: Run Semgrep
      uses: returntocorp/semgrep-action@v1
      with:
        config: >-
          p/security-audit
          p/owasp-top-ten
          p/mongodb
          p/nodejs

  dependency-check:
    runs-on: ubuntu-latest
    name: Dependency Scanning
    
    steps:
    - uses: actions/checkout@v3

    - name: Run npm audit
      run: |
        npm audit --production --audit-level=moderate || exit 1

    - name: Check for critical vulnerabilities
      run: npm audit --json --production | jq -e '.metadata.vulnerabilities.critical == 0' || (echo "Critical vulnerabilities found!"; exit 1)

  container-scan:
    runs-on: ubuntu-latest
    name: Container Scanning
    needs: build-and-push
    
    steps:
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: us-east-1

    - name: Scan ECR images with Trivy
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com/system-design-backend:${{ github.sha }}
        format: 'sarif'
        output: 'trivy-results.sarif'
        severity: 'CRITICAL,HIGH'

    - name: Upload Trivy results to GitHub Security tab
      uses: github/codeql-action/upload-sarif@v2
      with:
        sarif_file: 'trivy-results.sarif'
